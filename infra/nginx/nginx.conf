worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── Security ──────────────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options    nosniff       always;
    add_header X-Frame-Options           SAMEORIGIN    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;

    # ─── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    # ─── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_burst:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m   rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── Upstreams ─────────────────────────────────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:4000;
    }

    upstream web_frontend {
        server web:3000;
    }

    upstream admin_frontend {
        server admin:3000;
    }

    upstream admin_console_frontend {
        server admin-console:3000;
    }

    upstream staff_console_frontend {
        server staff-console:3000;
    }

    # ─── API Server ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.wilkins.local;

        limit_req zone=api_burst burst=50 nodelay;
        limit_conn addr 100;

        # Health check — no rate limit
        location = /api/v1/health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        # WebSocket upgrade for chat + emergency
        location ~ ^/(chat|emergency) {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }

    # ─── Guest PWA ─────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        limit_req zone=general burst=30 nodelay;

        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js static assets — long cache
        location /_next/static {
            proxy_pass http://web_frontend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ─── Admin CMS ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name admin.wilkins.local;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://admin_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Admin Console ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name console.wilkins.local;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://admin_console_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Staff Console ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name staff.wilkins.local;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://staff_console_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
