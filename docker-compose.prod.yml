# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.9'

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  redis:
    restart: always
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'

  api:
    restart: always
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'
    labels:
      - 'com.wilkins.service=api'
      - 'com.wilkins.tier=backend'

  web:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  admin:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  admin-console:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  staff-console:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: wilkins_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
      - admin
      - admin-console
      - staff-console
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '30m'
        max-file: '5'
